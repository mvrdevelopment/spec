name: On push

on: push

jobs:
  test_links:
    name: Test links
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: List files
        run: ls -la
      - uses: docker://pandoc/core:2.9
        with:
          args: >- # allows you to break string into multiple lines
            --standalone
            --from markdown
            --output=mvr-spec.html
            mvr-spec.md
      - name: Run htmltest
        uses: wjdp/htmltest-action@master
        with:
          path: mvr-spec.html

  generate_doc:
    name: Generate doc
    timeout-minutes: 5
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: List files
        run: |
          ls -la
          mkdir output
      - uses: docker://pandoc/core:2.9
        with:
          args: >- # allows you to break string into multiple lines
            --standalone
            --from markdown
            --output=mvr-spec.docx
            mvr-spec.md
      - uses: actions/upload-artifact@v4
        with:
          name: mvr-spec
          path: mvr-spec.docx
